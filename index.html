<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Fablead WA-Broadcast - Professional WhatsApp Marketing Platform
    </title>
    <meta
      name="description"
      content="Professional Fablead WA-Broadcast for businesses. Send bulk messages, manage contacts, create templates, and track campaigns with our powerful WhatsApp Business API integration."
    />
    <meta
      name="keywords"
      content="WhatsApp bulk, WhatsApp marketing, bulk messaging, WhatsApp business API, message templates, contact management, campaign analytics"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      function cleanupAttributes() {
        document.querySelectorAll("[data-lov-id]").forEach((element) => {
          element.removeAttribute("data-lov-id");
          element.removeAttribute("data-lov-name");
          element.removeAttribute("data-component-path");
          element.removeAttribute("data-component-line");
          element.removeAttribute("data-component-file");
          element.removeAttribute("data-component-name");
          element.removeAttribute("data-component-content");
        });
      }

      // Run cleanup initially
      cleanupAttributes();

      const observer = new MutationObserver(function (mutations) {
        mutations.forEach(function (mutation) {
          mutation.addedNodes.forEach(function (node) {
            if (node.nodeType === Node.ELEMENT_NODE) {
              cleanupAttributes();
            }
          });
        });
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
      });
    </script>
  </body>
</html>
